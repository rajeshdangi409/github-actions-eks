apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flask-app
  namespace: flask-app
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/flask-app
      sourceRef:
        kind: GitRepository
        name: github-actions-eks
        namespace: flux-system
      interval: 1m
      reconcileStrategy: Revision
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3